name: Auto Farmer

on:
  schedule:
    - cron: '0 * * * *' # Run at minute 0 of every hour
  workflow_dispatch: # Allow manual triggering

jobs:
  farm:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Allow GitHub Actions to commit back
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Configure Git
        run: |
          git config --global user.name "Iamsujithd"
          git config --global user.email "d.sujith@outlook.com"
          
      - name: Run Farmer Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/farmer.py
